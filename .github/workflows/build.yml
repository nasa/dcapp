name: Build

on:
  push:
    branches:
      - master
      - dcapp-pl
      - feature/*
      - fix/*
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VULKAN_VERSION: 1.4.341.0

jobs:
  ubuntu:
    name: Ubuntu ${{ matrix.config }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        config: [release, debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Vulkan SDK cache
        id: cache-vulkan
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/vulkan-sdk
          key: vulkan-sdk-ubuntu-${{ env.VULKAN_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-x11-dev libx11-xcb-dev \
            libxcb-xfixes0-dev libxcb-cursor-dev libxcb-cursor0 libxcb-keysyms1-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl-dev \
            libxml2-dev libgdal-dev libcurl4-openssl-dev procps

      - name: Install LunarG Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/vulkan-sdk"
          cd "$GITHUB_WORKSPACE/vulkan-sdk"
          curl -L "https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/linux/vulkansdk-linux-x86_64-${VULKAN_VERSION}.tar.xz" -o vk.tar.xz
          tar -xf vk.tar.xz
          rm vk.tar.xz

      - name: Save Vulkan SDK cache
        if: success() && steps.cache-vulkan.outputs.cache-hit != 'true' && matrix.config == 'release'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/vulkan-sdk
          key: vulkan-sdk-ubuntu-${{ env.VULKAN_VERSION }}

      - name: Build
        run: |
          export VULKAN_SDK="$GITHUB_WORKSPACE/vulkan-sdk/${VULKAN_VERSION}/x86_64"
          cd scripts
          chmod +x build.sh
          ./build.sh -c "${{ matrix.config }}"

  fedora:
    name: Fedora ${{ matrix.config }}
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        config: [release, debug]
    steps:
      - name: Install base tooling
        run: dnf install -y git gcc gcc-c++ make curl which findutils python3 procps-ng xz tar

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Vulkan SDK cache
        id: cache-vulkan
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/vulkan-sdk
          key: vulkan-sdk-fedora-${{ env.VULKAN_VERSION }}

      - name: Install system dependencies
        run: |
          dnf install -y \
            libX11-devel libxkbcommon-x11-devel libX11-xcb libxcb-devel \
            xcb-util-cursor-devel xcb-util-keysyms-devel mesa-libGL-devel \
            libXcursor-devel libXrandr-devel libXinerama-devel libXi-devel \
            libxml2-devel gdal-devel libcurl-devel

      - name: Install LunarG Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/vulkan-sdk"
          cd "$GITHUB_WORKSPACE/vulkan-sdk"
          curl -L "https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/linux/vulkansdk-linux-x86_64-${VULKAN_VERSION}.tar.xz" -o vk.tar.xz
          tar -xf vk.tar.xz
          rm vk.tar.xz

      - name: Save Vulkan SDK cache
        if: success() && steps.cache-vulkan.outputs.cache-hit != 'true' && matrix.config == 'release'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/vulkan-sdk
          key: vulkan-sdk-fedora-${{ env.VULKAN_VERSION }}

      - name: Build
        run: |
          export VULKAN_SDK="$GITHUB_WORKSPACE/vulkan-sdk/${VULKAN_VERSION}/x86_64"
          cd scripts
          chmod +x build.sh
          ./build.sh -c "${{ matrix.config }}"

  macos:
    name: macOS ${{ matrix.config }}
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        config: [release, debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Vulkan SDK cache
        id: cache-vulkan
        uses: actions/cache/restore@v4
        with:
          path: ~/VulkanSDK/${{ env.VULKAN_VERSION }}
          key: vulkan-sdk-macos-${{ env.VULKAN_VERSION }}

      - name: Cache brew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-macos-v1

      - name: Install system dependencies
        run: brew install libxml2 gdal

      - name: Install LunarG Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        run: |
          curl -L "https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/mac/vulkan-sdk.dmg" -o vk.zip
          unzip -q vk.zip
          sudo ./vulkansdk-macOS-${VULKAN_VERSION}.app/Contents/MacOS/vulkansdk-macOS-${VULKAN_VERSION} \
            --root "$HOME/VulkanSDK/${VULKAN_VERSION}" --accept-licenses --default-answer --confirm-command install \
            com.lunarg.vulkan.core com.lunarg.vulkan.usr com.lunarg.vulkan.sdl2 com.lunarg.vulkan.glm \
            com.lunarg.vulkan.volk com.lunarg.vulkan.vma
          rm -rf "vulkansdk-macOS-${VULKAN_VERSION}.app" vk.zip

      - name: Save Vulkan SDK cache
        if: success() && steps.cache-vulkan.outputs.cache-hit != 'true' && matrix.config == 'release'
        uses: actions/cache/save@v4
        with:
          path: ~/VulkanSDK/${{ env.VULKAN_VERSION }}
          key: vulkan-sdk-macos-${{ env.VULKAN_VERSION }}

      - name: Build
        run: |
          export VULKAN_SDK="$HOME/VulkanSDK/${VULKAN_VERSION}/macOS"
          cd scripts
          chmod +x build.sh
          ./build.sh -c "${{ matrix.config }}"

  windows:
    name: Windows ${{ matrix.config }}
    runs-on: windows-2022
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        config: [release, debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Vulkan SDK cache
        id: cache-vulkan
        uses: actions/cache/restore@v4
        with:
          path: D:/a/VulkanSDK
          key: vulkan-sdk-windows-${{ env.VULKAN_VERSION }}

      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe" -OutFile VulkanSDK.exe
          ./VulkanSDK.exe --accept-licenses --default-answer --root D:/a/VulkanSDK --confirm-command install

      - name: Save Vulkan SDK cache
        if: success() && steps.cache-vulkan.outputs.cache-hit != 'true' && matrix.config == 'release'
        uses: actions/cache/save@v4
        with:
          path: D:/a/VulkanSDK
          key: vulkan-sdk-windows-${{ env.VULKAN_VERSION }}

      - name: Restore vcpkg cache
        id: cache-vcpkg
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg_installed
            D:\a\vcpkg-binary-cache
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

      - name: Install vcpkg dependencies
        shell: cmd
        run: |
          if not exist D:\a\vcpkg-binary-cache mkdir D:\a\vcpkg-binary-cache
          set VCPKG_BINARY_SOURCES=clear;files,D:\a\vcpkg-binary-cache,readwrite
          vcpkg install --triplet x64-windows
          if %ERRORLEVEL% NEQ 0 exit 1

      - name: Save vcpkg cache
        if: success() && steps.cache-vcpkg.outputs.cache-hit != 'true' && matrix.config == 'release'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.workspace }}\vcpkg_installed
            D:\a\vcpkg-binary-cache
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

      - name: Build
        shell: cmd
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          set VULKAN_SDK=D:/a/VulkanSDK
          set CL=/MP
          set INCLUDE=%GITHUB_WORKSPACE%\vcpkg_installed\x64-windows\include;%INCLUDE%
          set LIB=%GITHUB_WORKSPACE%\vcpkg_installed\x64-windows\lib;%LIB%
          set PATH=%GITHUB_WORKSPACE%\vcpkg_installed\x64-windows\bin;%PATH%
          cd scripts
          call build.bat -c ${{ matrix.config }}
          if %ERRORLEVEL% NEQ 0 exit 1
