name: Build

on:
  push:
    branches:
      - master
      - dcapp-pl
      - feature/*
      - fix/*
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.4.309-jammy.list https://packages.lunarg.com/vulkan/1.4.309/lunarg-vulkan-1.4.309-jammy.list
          sudo apt update
          sudo apt install -y vulkan-sdk
          sudo apt install -y libx11-dev libxkbcommon-x11-dev libx11-xcb-dev
          sudo apt install -y libxcb-xfixes0-dev libxcb-cursor-dev libxcb-cursor0 libxcb-keysyms1-dev
          sudo apt install -y libxcursor-dev libxrandr-dev libxinerama-dev libgl-dev libxi-dev
          sudo apt install -y libxml2-dev libgdal-dev

      - name: Build (release)
        run: |
          cd scripts
          chmod +x build.sh
          ./build.sh -c release

      - name: Clean
        run: rm -rf pilotlight/out

      - name: Build (debug)
        run: |
          cd scripts
          ./build.sh -c debug

  fedora:
    runs-on: ubuntu-22.04
    container:
      image: fedora:latest
    steps:
      - name: Install base tooling
        run: |
          dnf install -y git gcc gcc-c++ make wget which findutils python3

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          # X11 / XCB
          dnf install -y libX11-devel libxkbcommon-x11-devel libX11-xcb libxcb-devel
          dnf install -y xcb-util-cursor-devel xcb-util-keysyms-devel
          dnf install -y libXcursor-devel libXrandr-devel libXinerama-devel libXi-devel
          dnf install -y mesa-libGL-devel

          # dcapp deps
          dnf install -y libxml2-devel gdal-devel

          # Vulkan SDK
          dnf install -y vulkan-headers vulkan-loader-devel vulkan-tools glslang-devel

      - name: Build (release)
        run: |
          cd scripts
          chmod +x build.sh
          ./build.sh -c release

      - name: Clean
        run: rm -rf pilotlight/out

      - name: Build (debug)
        run: |
          cd scripts
          ./build.sh -c debug

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install libxml2 gdal
          curl -L https://sdk.lunarg.com/sdk/download/1.3.283.0/mac/vulkansdk-macos-1.3.283.0.dmg -o vk.dmg
          hdiutil attach vk.dmg
          sudo /Volumes/vulkansdk-macos-1.3.283.0/InstallVulkan.app/Contents/MacOS/InstallVulkan \
            --root $HOME/VulkanSDK/1.3.283.0 --accept-licenses --default-answer --confirm-command install \
            com.lunarg.vulkan.core com.lunarg.vulkan.usr com.lunarg.vulkan.sdl2 com.lunarg.vulkan.glm \
            com.lunarg.vulkan.volk com.lunarg.vulkan.vma

      - name: Build (release)
        run: |
          export VULKAN_SDK=$HOME/VulkanSDK/1.3.283.0/macOS
          cd scripts
          chmod +x build.sh
          ./build.sh -c release

      - name: Clean
        run: rm -rf pilotlight/out

      - name: Build (debug)
        run: |
          export VULKAN_SDK=$HOME/VulkanSDK/1.3.283.0/macOS
          cd scripts
          ./build.sh -c debug

  windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        run: |
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.3.296.0/windows/VulkanSDK-1.3.296.0-Installer.exe" -OutFile VulkanSDK.exe
          ./VulkanSDK.exe --accept-licenses --default-answer --root D:/a/VulkanSDK --confirm-command install

      - name: Build (release)
        shell: cmd
        run: |
          set VULKAN_SDK=D:/a/VulkanSDK
          cd scripts
          call build.bat -c release
          if %ERRORLEVEL% NEQ 0 exit 1

      - name: Clean
        shell: cmd
        run: rmdir /S /Q pilotlight\out

      - name: Build (debug)
        shell: cmd
        run: |
          set VULKAN_SDK=D:/a/VulkanSDK
          cd scripts
          call build.bat -c debug
          if %ERRORLEVEL% NEQ 0 exit 1
