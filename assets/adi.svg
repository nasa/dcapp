<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="4096"
  height="2048"
  viewBox="0 0 4096 2048"
  xmlns="http://www.w3.org/2000/svg"
>

  <defs>
    <!-- Cosmic sky gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b48cff"/>
      <stop offset="35%"  stop-color="#5b2dd6"/>
      <stop offset="70%"  stop-color="#1a0b44"/>
      <stop offset="100%" stop-color="#02010a"/>
    </linearGradient>

    <!-- Ground gradient -->
    <linearGradient id="gndGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3b2a"/>
      <stop offset="55%"  stop-color="#0b2418"/>
      <stop offset="100%" stop-color="#020a05"/>
    </linearGradient>

    <!-- Global vignette: light edges, dark center -->
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Nebula bands -->
    <linearGradient id="nebulaA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ff73c8" stop-opacity="0.00"/>
      <stop offset="35%"  stop-color="#ff73c8" stop-opacity="0.18"/>
      <stop offset="65%"  stop-color="#7cf6ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7cf6ff" stop-opacity="0.00"/>
    </linearGradient>

    <linearGradient id="nebulaB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffe36a" stop-opacity="0.00"/>
      <stop offset="45%"  stop-color="#ffe36a" stop-opacity="0.14"/>
      <stop offset="55%"  stop-color="#a7ff83" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a7ff83" stop-opacity="0.00"/>
    </linearGradient>

    <!-- Star field pattern (denser than before) -->
    <pattern id="starsDense" width="256" height="256" patternUnits="userSpaceOnUse">
      <!-- small stars -->
      <circle cx="18"  cy="22"  r="1.2" fill="#ffffff" opacity="0.55"/>
      <circle cx="40"  cy="60"  r="1.6" fill="#ffffff" opacity="0.85"/>
      <circle cx="62"  cy="190" r="1.1" fill="#ffffff" opacity="0.45"/>
      <circle cx="88"  cy="120" r="1.3" fill="#ffffff" opacity="0.60"/>
      <circle cx="90"  cy="180" r="1.9" fill="#ffffff" opacity="0.75"/>
      <circle cx="115" cy="35"  r="1.1" fill="#ffffff" opacity="0.50"/>
      <circle cx="130" cy="30"  r="1.3" fill="#ffffff" opacity="0.65"/>
      <circle cx="150" cy="160" r="1.0" fill="#ffffff" opacity="0.40"/>
      <circle cx="180" cy="90"  r="1.2" fill="#ffffff" opacity="0.55"/>
      <circle cx="200" cy="40"  r="1.0" fill="#ffffff" opacity="0.38"/>
      <circle cx="210" cy="210" r="1.0" fill="#ffffff" opacity="0.45"/>
      <circle cx="235" cy="20"  r="1.4" fill="#ffffff" opacity="0.60"/>
      <circle cx="245" cy="130" r="1.1" fill="#ffffff" opacity="0.50"/>

      <!-- a couple bigger “sparkle” stars -->
      <path d="M 170 210 L 172 216 L 178 218 L 172 220 L 170 226 L 168 220 L 162 218 L 168 216 Z"
            fill="#ffffff" opacity="0.45"/>
      <path d="M 30 140 L 32 146 L 38 148 L 32 150 L 30 156 L 28 150 L 22 148 L 28 146 Z"
            fill="#ffffff" opacity="0.40"/>
    </pattern>

    <!-- Rock/pebble pattern for underground (tiles cleanly) -->
    <pattern id="rocks" width="220" height="220" patternUnits="userSpaceOnUse">
      <!-- base pebbles (dark) -->
      <ellipse cx="30"  cy="40"  rx="18" ry="12" fill="#000000" opacity="0.22"/>
      <ellipse cx="95"  cy="70"  rx="14" ry="10" fill="#000000" opacity="0.18"/>
      <ellipse cx="160" cy="45"  rx="20" ry="14" fill="#000000" opacity="0.20"/>
      <ellipse cx="55"  cy="140" rx="22" ry="16" fill="#000000" opacity="0.20"/>
      <ellipse cx="140" cy="145" rx="16" ry="12" fill="#000000" opacity="0.18"/>
      <ellipse cx="190" cy="170" rx="18" ry="13" fill="#000000" opacity="0.19"/>

      <!-- highlights (subtle, keeps it from looking flat) -->
      <ellipse cx="26"  cy="36"  rx="6" ry="4" fill="#ffffff" opacity="0.06"/>
      <ellipse cx="90"  cy="66"  rx="5" ry="3" fill="#ffffff" opacity="0.05"/>
      <ellipse cx="154" cy="41"  rx="6" ry="4" fill="#ffffff" opacity="0.05"/>
      <ellipse cx="50"  cy="136" rx="7" ry="5" fill="#ffffff" opacity="0.05"/>
      <ellipse cx="135" cy="141" rx="5" ry="3" fill="#ffffff" opacity="0.05"/>
      <ellipse cx="184" cy="166" rx="6" ry="4" fill="#ffffff" opacity="0.05"/>

      <!-- tiny grit -->
      <circle cx="115" cy="120" r="2" fill="#000000" opacity="0.18"/>
      <circle cx="205" cy="25"  r="2" fill="#000000" opacity="0.14"/>
      <circle cx="15"  cy="205" r="2" fill="#000000" opacity="0.14"/>
    </pattern>

    <!-- Beam glow for UFO -->
    <radialGradient id="beamGlow" cx="50%" cy="0%" r="90%">
      <stop offset="0%"   stop-color="#7cf6ff" stop-opacity="0.34"/>
      <stop offset="70%"  stop-color="#7cf6ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7cf6ff" stop-opacity="0.00"/>
    </radialGradient>

    <style>
      .grid { stroke: #ffffff; stroke-width: 2; opacity: 0.18; }
      .horizon { stroke: #ff7af6; stroke-width: 6; opacity: 0.92; }

      .pitchBar { stroke: #7cf6ff; stroke-width: 4; opacity: 0.80; }
      .contour  { stroke: #3cff9e; stroke-width: 2; opacity: 0.28; }

      .ufoLine  { stroke: #ffe36a; stroke-width: 5; opacity: 0.95; fill: none; }
      .ufoFill  { fill: #3a2b6f; opacity: 0.95; }
      .ufoGlass { fill: #7cf6ff; opacity: 0.55; }
      .ufoLight { fill: #ffe36a; opacity: 0.88; }

      .rollLbl {
        fill: #ffd966;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        font-size: 44px;
        font-weight: 700;
        opacity: 0.88;
      }
    </style>
  </defs>

  <!-- Base halves -->
  <rect x="0" y="0"    width="4096" height="1024" fill="url(#skyGrad)"/>
  <rect x="0" y="1024" width="4096" height="1024" fill="url(#gndGrad)"/>

  <!-- Nebula -->
  <rect x="0" y="180" width="4096" height="220" fill="url(#nebulaA)"/>
  <rect x="0" y="520" width="4096" height="240" fill="url(#nebulaB)"/>

  <!-- Stars (denser) -->
  <rect x="0" y="0" width="4096" height="1024" fill="url(#starsDense)"/>

  <!-- Underground rocks pattern -->
  <rect x="0" y="1024" width="4096" height="1024" fill="url(#rocks)" opacity="0.95"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="4096" height="2048" fill="url(#vignette)"/>

  <!-- Straight horizon -->
  <line x1="0" y1="1024" x2="4096" y2="1024" class="horizon"/>

  <!-- Pitch ladder (chunky, compression-friendly) -->
  <g>
    <line class="pitchBar" x1="1500" y1="820"  x2="2596" y2="820"/>
    <line class="pitchBar" x1="1450" y1="680"  x2="2646" y2="680"/>
    <line class="pitchBar" x1="1400" y1="520"  x2="2696" y2="520"/>

    <line class="pitchBar" x1="1500" y1="1220" x2="2596" y2="1220"/>
    <line class="pitchBar" x1="1450" y1="1380" x2="2646" y2="1380"/>
    <line class="pitchBar" x1="1400" y1="1540" x2="2696" y2="1540"/>
  </g>

  <!-- A few big “contour” arcs (still fun, not too busy) -->
  <g>
    <ellipse class="contour" cx="2048" cy="1180" rx="1500" ry="180"/>
    <ellipse class="contour" cx="2048" cy="1420" rx="1050" ry="150"/>
    <ellipse class="contour" cx="2048" cy="1660" rx="650"  ry="115"/>
    <ellipse class="contour" cx="2048" cy="1900" rx="260"  ry="70"/>
  </g>

  <!-- Cartoon UFO (sky) -->
  <g transform="translate(780,230)">
    <!-- Beam glow -->
    <path d="M 240 140 L 110 760 L 370 760 Z" fill="url(#beamGlow)" opacity="0.7"/>

    <!-- Saucer base -->
    <ellipse cx="240" cy="120" rx="240" ry="70" class="ufoFill"/>
    <path d="M 25 120 Q 240 15 455 120" class="ufoLine"/>

    <!-- Dome -->
    <ellipse cx="240" cy="75" rx="95" ry="60" class="ufoGlass"/>

    <!-- Lights -->
    <circle cx="110" cy="135" r="15" class="ufoLight"/>
    <circle cx="170" cy="148" r="15" class="ufoLight"/>
    <circle cx="240" cy="154" r="15" class="ufoLight"/>
    <circle cx="310" cy="148" r="15" class="ufoLight"/>
    <circle cx="370" cy="135" r="15" class="ufoLight"/>

    <!-- Antenna -->
    <line x1="240" y1="8" x2="240" y2="42" class="ufoLine"/>
    <circle cx="240" cy="7" r="9" fill="#ffe36a" opacity="0.9"/>
  </g>

  <!-- Subtle roll grid every 30° -->
  <g>
    <line class="grid" x1="341.333"  y1="0" x2="341.333"  y2="2048"/>
    <line class="grid" x1="682.667"  y1="0" x2="682.667"  y2="2048"/>
    <line class="grid" x1="1024.000" y1="0" x2="1024.000" y2="2048"/>
    <line class="grid" x1="1365.333" y1="0" x2="1365.333" y2="2048"/>
    <line class="grid" x1="1706.667" y1="0" x2="1706.667" y2="2048"/>
    <line class="grid" x1="2048.000" y1="0" x2="2048.000" y2="2048"/>
    <line class="grid" x1="2389.333" y1="0" x2="2389.333" y2="2048"/>
    <line class="grid" x1="2730.667" y1="0" x2="2730.667" y2="2048"/>
    <line class="grid" x1="3072.000" y1="0" x2="3072.000" y2="2048"/>
    <line class="grid" x1="3413.333" y1="0" x2="3413.333" y2="2048"/>
    <line class="grid" x1="3754.667" y1="0" x2="3754.667" y2="2048"/>
  </g>

  <!-- Roll labels at 6 pitch rows (centered in each 30° pitch band) -->
  <!-- pitch rows: +75,+45,+15,-15,-45,-75 -->
  <!-- y = (90 - pitch)/180 * 2048 -->
  <!-- +75=170.667, +45=512, +15=853.333, -15=1194.667, -45=1536, -75=1877.333 -->
  <g class="rollLbl">
    <!-- X positions: -150..150 plus 0 -->
    <!-- -150:341.333  -120:682.667  -90:1024  -60:1365.333  -30:1706.667  0:2048
         30:2389.333   60:2730.667   90:3072   120:3413.333  150:3754.667 -->

    <!-- Row y=170.667 -->
    <text x="341.333"  y="170.667" text-anchor="middle" dominant-baseline="middle">-150</text>
    <text x="682.667"  y="170.667" text-anchor="middle" dominant-baseline="middle">-120</text>
    <text x="1024.000" y="170.667" text-anchor="middle" dominant-baseline="middle">-90</text>
    <text x="1365.333" y="170.667" text-anchor="middle" dominant-baseline="middle">-60</text>
    <text x="1706.667" y="170.667" text-anchor="middle" dominant-baseline="middle">-30</text>
    <text x="2048.000" y="170.667" text-anchor="middle" dominant-baseline="middle">0</text>
    <text x="2389.333" y="170.667" text-anchor="middle" dominant-baseline="middle">30</text>
    <text x="2730.667" y="170.667" text-anchor="middle" dominant-baseline="middle">60</text>
    <text x="3072.000" y="170.667" text-anchor="middle" dominant-baseline="middle">90</text>
    <text x="3413.333" y="170.667" text-anchor="middle" dominant-baseline="middle">120</text>
    <text x="3754.667" y="170.667" text-anchor="middle" dominant-baseline="middle">150</text>

    <!-- Row y=512 -->
    <text x="341.333"  y="512.000" text-anchor="middle" dominant-baseline="middle">-150</text>
    <text x="682.667"  y="512.000" text-anchor="middle" dominant-baseline="middle">-120</text>
    <text x="1024.000" y="512.000" text-anchor="middle" dominant-baseline="middle">-90</text>
    <text x="1365.333" y="512.000" text-anchor="middle" dominant-baseline="middle">-60</text>
    <text x="1706.667" y="512.000" text-anchor="middle" dominant-baseline="middle">-30</text>
    <text x="2048.000" y="512.000" text-anchor="middle" dominant-baseline="middle">0</text>
    <text x="2389.333" y="512.000" text-anchor="middle" dominant-baseline="middle">30</text>
    <text x="2730.667" y="512.000" text-anchor="middle" dominant-baseline="middle">60</text>
    <text x="3072.000" y="512.000" text-anchor="middle" dominant-baseline="middle">90</text>
    <text x="3413.333" y="512.000" text-anchor="middle" dominant-baseline="middle">120</text>
    <text x="3754.667" y="512.000" text-anchor="middle" dominant-baseline="middle">150</text>

    <!-- Row y=853.333 -->
    <text x="341.333"  y="853.333" text-anchor="middle" dominant-baseline="middle">-150</text>
    <text x="682.667"  y="853.333" text-anchor="middle" dominant-baseline="middle">-120</text>
    <text x="1024.000" y="853.333" text-anchor="middle" dominant-baseline="middle">-90</text>
    <text x="1365.333" y="853.333" text-anchor="middle" dominant-baseline="middle">-60</text>
    <text x="1706.667" y="853.333" text-anchor="middle" dominant-baseline="middle">-30</text>
    <text x="2048.000" y="853.333" text-anchor="middle" dominant-baseline="middle">0</text>
    <text x="2389.333" y="853.333" text-anchor="middle" dominant-baseline="middle">30</text>
    <text x="2730.667" y="853.333" text-anchor="middle" dominant-baseline="middle">60</text>
    <text x="3072.000" y="853.333" text-anchor="middle" dominant-baseline="middle">90</text>
    <text x="3413.333" y="853.333" text-anchor="middle" dominant-baseline="middle">120</text>
    <text x="3754.667" y="853.333" text-anchor="middle" dominant-baseline="middle">150</text>

    <!-- Row y=1194.667 -->
    <text x="341.333"  y="1194.667" text-anchor="middle" dominant-baseline="middle">-150</text>
    <text x="682.667"  y="1194.667" text-anchor="middle" dominant-baseline="middle">-120</text>
    <text x="1024.000" y="1194.667" text-anchor="middle" dominant-baseline="middle">-90</text>
    <text x="1365.333" y="1194.667" text-anchor="middle" dominant-baseline="middle">-60</text>
    <text x="1706.667" y="1194.667" text-anchor="middle" dominant-baseline="middle">-30</text>
    <text x="2048.000" y="1194.667" text-anchor="middle" dominant-baseline="middle">0</text>
    <text x="2389.333" y="1194.667" text-anchor="middle" dominant-baseline="middle">30</text>
    <text x="2730.667" y="1194.667" text-anchor="middle" dominant-baseline="middle">60</text>
    <text x="3072.000" y="1194.667" text-anchor="middle" dominant-baseline="middle">90</text>
    <text x="3413.333" y="1194.667" text-anchor="middle" dominant-baseline="middle">120</text>
    <text x="3754.667" y="1194.667" text-anchor="middle" dominant-baseline="middle">150</text>

    <!-- Row y=1536 -->
    <text x="341.333"  y="1536.000" text-anchor="middle" dominant-baseline="middle">-150</text>
    <text x="682.667"  y="1536.000" text-anchor="middle" dominant-baseline="middle">-120</text>
    <text x="1024.000" y="1536.000" text-anchor="middle" dominant-baseline="middle">-90</text>
    <text x="1365.333" y="1536.000" text-anchor="middle" dominant-baseline="middle">-60</text>
    <text x="1706.667" y="1536.000" text-anchor="middle" dominant-baseline="middle">-30</text>
    <text x="2048.000" y="1536.000" text-anchor="middle" dominant-baseline="middle">0</text>
    <text x="2389.333" y="1536.000" text-anchor="middle" dominant-baseline="middle">30</text>
    <text x="2730.667" y="1536.000" text-anchor="middle" dominant-baseline="middle">60</text>
    <text x="3072.000" y="1536.000" text-anchor="middle" dominant-baseline="middle">90</text>
    <text x="3413.333" y="1536.000" text-anchor="middle" dominant-baseline="middle">120</text>
    <text x="3754.667" y="1536.000" text-anchor="middle" dominant-baseline="middle">150</text>

    <!-- Row y=1877.333 -->
    <text x="341.333"  y="1877.333" text-anchor="middle" dominant-baseline="middle">-150</text>
    <text x="682.667"  y="1877.333" text-anchor="middle" dominant-baseline="middle">-120</text>
    <text x="1024.000" y="1877.333" text-anchor="middle" dominant-baseline="middle">-90</text>
    <text x="1365.333" y="1877.333" text-anchor="middle" dominant-baseline="middle">-60</text>
    <text x="1706.667" y="1877.333" text-anchor="middle" dominant-baseline="middle">-30</text>
    <text x="2048.000" y="1877.333" text-anchor="middle" dominant-baseline="middle">0</text>
    <text x="2389.333" y="1877.333" text-anchor="middle" dominant-baseline="middle">30</text>
    <text x="2730.667" y="1877.333" text-anchor="middle" dominant-baseline="middle">60</text>
    <text x="3072.000" y="1877.333" text-anchor="middle" dominant-baseline="middle">90</text>
    <text x="3413.333" y="1877.333" text-anchor="middle" dominant-baseline="middle">120</text>
    <text x="3754.667" y="1877.333" text-anchor="middle" dominant-baseline="middle">150</text>
  </g>
</svg>
